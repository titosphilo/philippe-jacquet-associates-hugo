eyebrow: "Specialismes"
heading: "Un travail clinique pour des difficultes complexes"
items:
  - title: "Troubles alimentaires masculins"
    url: "/eating-disorders/"
    text: "Accompagnement specialise pour l'anorexie, la boulimie, l'hyperphagie, l'image corporelle, l'exercice compulsif et la honte souvent cachee chez les hommes."
  - title: "EMDR et trauma"
    url: "/trauma-therapy-london/"
    text: "Travail EMDR pour les souvenirs traumatiques, le choc, les experiences relationnelles douloureuses et les reactions corporelles qui persistent apres l'evenement."
  - title: "Analyse jungienne"
    url: "/jungian-analysis/"
    text: "Exploration des reves, des symboles, des conflits inconscients, du sens et des grandes transitions de vie dans un cadre analytique profond."
  - title: "Addiction"
    url: "/addiction-specialist-london/"
    text: "Traitement confidentiel des addictions a l'alcool, aux drogues, au jeu, au sexe, au travail et aux comportements compulsifs."
  - title: "Coaching executif"
    url: "/executive-coaching/"
    text: "Accompagnement des dirigeants, entrepreneurs, traders et professionnels soumis a des decisions complexes, a la pression et a la performance."
  - title: "Art-therapie"
    url: "/art-therapy/"
    text: "Une voie expressive pour les clients qui ont besoin de travailler avec l'image, le symbole et l'experience non verbale."
